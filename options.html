<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Highlight → ChatGPT</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 18px;
            width: 380px;
            min-height: 460px;
            background: #111;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            margin: 0 0 18px 0;
            font-size: 20px;
        }

        label {
            display: block;
            margin-top: 16px;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: bold;
            color: #ddd;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #222;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        input:focus,
        textarea:focus {
            background: #2c2c2c;
        }

        textarea {
            resize: vertical;
            min-height: 130px;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #10a37f;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: .92;
        }

        #status {
            margin-top: 14px;
            font-size: 13px;
            color: #7dffb3;
        }

        .small {
            margin-top: 8px;
            font-size: 12px;
            color: #999;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <h1>Highlight → ChatGPT</h1>

    <section id="apiKeyContainer">
        <label for="apiKey">OpenAI API Key</label>
        <input type="password" id="apiKey" placeholder="sk-...">

        <div class="small">
            Stored locally in your browser.
        </div>
    </section>

    <section id="settingContainer" hidden>
        <label for="extraPrompt">Additional Prompt</label>
        <textarea id="extraPrompt" placeholder="Example: Give only the direct answer. No explanation."></textarea>

        <div class="small">
            This text is added before selected text every time.
        </div>

        <label for="model">Model</label>
        <select id="model" name="model"></select>

        <label for="maxOutputTokens">Max Output Tokens</label>
        <input type="number" id="maxOutputTokens" placeholder="Put Max Output Tokens.">

        <button id="saveBtn">Save Settings</button>

        <div id="status"></div>
    </section>

    <script src="options.js"></script>

</body>

</html>
