<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Highlight → ChatGPT</title>
    <link rel="stylesheet" href="options.css">
</head>

<body>

    <h1>Highlight → ChatGPT</h1>

    <section id="message" hidden>
        <p></p>
    </section>

    <section id="apiKeyContainer">
        <label for="apiKey">OpenAI API Key</label>
        <input type="password" id="apiKey" placeholder="sk-...">

        <div class="small">
            Stored locally in your browser.
        </div>
    </section>

    <section id="settingContainer" hidden>
        <label for="extraPrompt">Additional Prompt</label>
        <textarea id="extraPrompt" placeholder="Example: Give only the direct answer. No explanation."></textarea>

        <div class="small">
            This text is added before selected text every time.
        </div>

        <label for="model">Model</label>
        <select id="model" name="model"></select>

        <label for="maxOutputTokens">Max Output Tokens</label>
        <input type="number" id="maxOutputTokens" placeholder="Put Max Output Tokens.">

        <button id="saveBtn">Save Settings</button>

        <div id="status"></div>
    </section>

    <script src="options.js"></script>

</body>

</html>
